# Push main → Hugging Face Space whenever you push to GitHub.
# Target Space is read from hf.space.toml (namespace + name).

name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Load Space target from hf.space.toml
        run: python3 scripts/export_github_env.py

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push "https://${HF_NAMESPACE}:${HF_TOKEN}@huggingface.co/spaces/${HF_NAMESPACE}/${HF_SPACE_NAME}" main
